<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">web-access Skill 概念图</title>
  <desc id="desc">AI Agent 通过本地 CDP 代理连接用户真实浏览器，访问动态页面、登录态页面和浏览器数据。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="210" fill="#38bdf8" opacity="0.12"/>
  <circle cx="210" cy="690" r="260" fill="#a78bfa" opacity="0.10"/>

  <text x="84" y="104" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#f8fafc">web-access Skill</text>
  <text x="86" y="154" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">让 AI Agent 使用你的真实浏览器上下文</text>

  <g filter="url(#softShadow)">
    <rect x="92" y="258" width="280" height="230" rx="26" fill="url(#panel)" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="158" cy="326" r="32" fill="#22d3ee" opacity="0.88"/>
    <path d="M146 326h24M158 314v24" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
    <text x="126" y="396" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">AI Agent</text>
    <text x="126" y="440" font-family="Inter, Arial, sans-serif" font-size="22" fill="#dbeafe">提出目标</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="560" y="242" width="280" height="260" rx="30" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
    <rect x="608" y="296" width="184" height="118" rx="16" fill="#1e293b" stroke="#67e8f9" stroke-width="3"/>
    <path d="M646 348h108M646 382h78" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
    <circle cx="746" cy="446" r="17" fill="#f59e0b"/>
    <text x="626" y="554" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">CDP Proxy</text>
    <text x="601" y="594" font-family="Inter, Arial, sans-serif" font-size="20" fill="#cbd5e1">127.0.0.1:3456</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1036" y="238" width="282" height="268" rx="30" fill="url(#panel)" stroke="#a78bfa" stroke-width="3"/>
    <rect x="1088" y="300" width="178" height="116" rx="18" fill="#eef2ff"/>
    <rect x="1088" y="300" width="178" height="30" rx="16" fill="#c4b5fd"/>
    <circle cx="1110" cy="315" r="5" fill="#ef4444"/>
    <circle cx="1128" cy="315" r="5" fill="#f59e0b"/>
    <circle cx="1146" cy="315" r="5" fill="#10b981"/>
    <path d="M1116 355h92M1116 382h120" stroke="#64748b" stroke-width="8" stroke-linecap="round"/>
    <text x="1080" y="554" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">Chrome / Edge</text>
    <text x="1078" y="594" font-family="Inter, Arial, sans-serif" font-size="20" fill="#dbeafe">登录态、动态渲染、页面操作</text>
  </g>

  <path d="M388 374 C452 374 486 374 540 374" stroke="#67e8f9" stroke-width="8" fill="none" marker-end="url(#arrow)"/>
  <path d="M858 374 C930 374 956 374 1016 374" stroke="#67e8f9" stroke-width="8" fill="none" marker-end="url(#arrow)"/>

  <g opacity="0.9">
    <rect x="184" y="620" width="1032" height="62" rx="31" fill="#020617" opacity="0.28" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="250" y="660" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#f8fafc">适合：登录态页面、反爬动态站点、浏览器历史书签、截图、媒体提取、真实 UI 操作</text>
  </g>
</svg>
