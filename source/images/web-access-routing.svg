<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="720" viewBox="0 0 1320 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex 中选择网页访问方式的路线图</title>
  <desc id="desc">根据任务类型选择 web.run、curl、浏览器插件或 web-access CDP。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0284c7"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, Arial, sans-serif; fill: #0f172a; }
      .label { font: 800 25px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 600 20px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 600 17px Inter, Arial, sans-serif; fill: #64748b; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .choice { fill: #f0f9ff; stroke: #38bdf8; stroke-width: 3; }
      .webaccess { fill: #fff7ed; stroke: #f59e0b; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1320" height="720" fill="url(#bg)"/>
  <text x="72" y="76" class="title">什么时候该用 web-access？</text>
  <text x="74" y="116" class="body">先选最轻的可靠路径；只有需要真实浏览器上下文时，才上 CDP。</text>

  <rect x="82" y="176" width="260" height="126" rx="18" class="choice"/>
  <text x="118" y="226" class="label">公开信息查询</text>
  <text x="118" y="263" class="body">新闻、价格、官方文档</text>
  <text x="118" y="290" class="small">优先 web.run</text>

  <rect x="530" y="176" width="260" height="126" rx="18" class="choice"/>
  <text x="564" y="226" class="label">简单页面读取</text>
  <text x="564" y="263" class="body">HTML、JSON、元数据</text>
  <text x="564" y="290" class="small">curl 或 web.open</text>

  <rect x="978" y="176" width="260" height="126" rx="18" class="choice"/>
  <text x="1012" y="226" class="label">本地页面测试</text>
  <text x="1012" y="263" class="body">localhost、交互检查</text>
  <text x="1012" y="290" class="small">浏览器插件</text>

  <rect x="316" y="424" width="688" height="160" rx="24" class="webaccess"/>
  <text x="386" y="480" class="label">真实浏览器能力</text>
  <text x="386" y="522" class="body">登录态、动态渲染、反爬页面、截图、视频帧、历史书签、UI 操作</text>
  <text x="386" y="558" class="small">这时使用 web-access CDP proxy</text>

  <path d="M342 258 C420 318 448 372 520 424" stroke="#0284c7" stroke-width="5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M660 304 L660 404" stroke="#0284c7" stroke-width="5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M978 258 C900 318 872 372 800 424" stroke="#0284c7" stroke-width="5" fill="none" marker-end="url(#arrowBlue)"/>

  <rect x="80" y="632" width="1160" height="44" rx="22" fill="#0f172a" opacity="0.9"/>
  <text x="132" y="661" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#f8fafc">一句话：web-access 解决的不是“能不能搜索”，而是“能不能像用户本人一样打开、看见并操作页面”。</text>
</svg>
