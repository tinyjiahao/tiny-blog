<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">ReAct 推理与行动循环</title>
  <desc id="desc">展示 Thought、Action、Observation 和 Final Answer 的循环关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fbbf24"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { fill: #f8fafc; font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .p { fill: #cbd5e1; font: 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .node { fill: rgba(15, 23, 42, .82); stroke: #5eead4; stroke-width: 2; rx: 22; }
      .answer { fill: rgba(146, 64, 14, .82); stroke: #fbbf24; stroke-width: 2; rx: 22; }
      .arrow { stroke: #fbbf24; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1100" height="640" rx="28" fill="url(#bg)"/>
  <text x="60" y="70" class="title">ReAct：推理和行动交替</text>
  <text x="60" y="105" class="p">每一步都根据观察结果决定下一步行动，直到信息足够生成最终答案。</text>

  <rect x="120" y="215" width="230" height="110" class="node"/>
  <text x="188" y="257" class="h">Thought</text>
  <text x="165" y="291" class="p">判断下一步要做什么</text>

  <rect x="435" y="215" width="230" height="110" class="node"/>
  <text x="502" y="257" class="h">Action</text>
  <text x="488" y="291" class="p">调用搜索、数据库或工具</text>

  <rect x="750" y="215" width="230" height="110" class="node"/>
  <text x="802" y="257" class="h">Observation</text>
  <text x="795" y="291" class="p">读取工具返回结果</text>

  <path d="M350 270 H425" class="arrow"/>
  <path d="M665 270 H740" class="arrow"/>
  <path d="M865 335 C820 430 280 430 235 335" class="arrow"/>

  <rect x="400" y="455" width="300" height="100" class="answer"/>
  <text x="478" y="496" class="h">Final Answer</text>
  <text x="458" y="530" class="p">证据充分后生成带依据的答案</text>
  <path d="M550 325 V445" class="arrow"/>
</svg>
