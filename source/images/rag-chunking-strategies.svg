<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">RAG 文档分块策略</title>
  <desc id="desc">对比固定长度、语义边界、滑动窗口和层级分块四种策略。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <style>
      .title { fill: #f8fafc; font: 700 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .card { fill: rgba(15, 23, 42, .78); stroke-width: 2; rx: 20; }
      .h { fill: #f8fafc; font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .p { fill: #cbd5e1; font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .hint { fill: #e0f2fe; font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .chunk { rx: 8; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Chunking 决定 RAG 的检索上限</text>
  <text x="60" y="105" class="p">好的分块既保留语义完整性，又能让检索命中足够精准的证据。</text>

  <rect x="60" y="145" width="515" height="210" class="card" stroke="#2dd4bf"/>
  <text x="92" y="190" class="h">固定长度分块</text>
  <rect x="92" y="225" width="86" height="46" class="chunk" fill="#0f766e"/>
  <rect x="190" y="225" width="86" height="46" class="chunk" fill="#0f766e"/>
  <rect x="288" y="225" width="86" height="46" class="chunk" fill="#0f766e"/>
  <rect x="386" y="225" width="86" height="46" class="chunk" fill="#0f766e"/>
  <text x="100" y="303" class="hint">每 N 个 token 切一刀</text>
  <text x="92" y="330" class="p">实现最简单，但容易切断句子或段落。</text>

  <rect x="625" y="145" width="515" height="210" class="card" stroke="#f59e0b"/>
  <text x="657" y="190" class="h">语义边界分块</text>
  <rect x="657" y="225" width="110" height="46" class="chunk" fill="#f59e0b"/>
  <rect x="785" y="225" width="155" height="46" class="chunk" fill="#f59e0b"/>
  <rect x="958" y="225" width="95" height="46" class="chunk" fill="#f59e0b"/>
  <text x="678" y="254" class="hint">标题</text>
  <text x="832" y="254" class="hint">完整段落</text>
  <text x="980" y="254" class="hint">列表</text>
  <text x="657" y="330" class="p">按标题、段落、句子切，主流且更稳。</text>

  <rect x="60" y="395" width="515" height="210" class="card" stroke="#60a5fa"/>
  <text x="92" y="440" class="h">滑动窗口 + overlap</text>
  <rect x="92" y="476" width="180" height="42" class="chunk" fill="#3b82f6"/>
  <rect x="212" y="516" width="180" height="42" class="chunk" fill="#2563eb"/>
  <rect x="332" y="476" width="160" height="42" class="chunk" fill="#3b82f6"/>
  <rect x="212" y="476" width="60" height="42" class="chunk" fill="#60a5fa" opacity=".72"/>
  <rect x="332" y="516" width="60" height="42" class="chunk" fill="#60a5fa" opacity=".72"/>
  <text x="219" y="501" class="hint">重叠</text>
  <text x="339" y="541" class="hint">重叠</text>
  <text x="92" y="585" class="p">避免边界信息丢失，适合代码和步骤说明。</text>

  <rect x="625" y="395" width="515" height="210" class="card" stroke="#a78bfa"/>
  <text x="657" y="440" class="h">递归 / 层级分块</text>
  <rect x="657" y="475" width="380" height="34" class="chunk" fill="#8b5cf6"/>
  <rect x="697" y="535" width="135" height="34" class="chunk" fill="#8b5cf6"/>
  <rect x="857" y="535" width="135" height="34" class="chunk" fill="#8b5cf6"/>
  <path d="M847 509 L765 535" class="line"/>
  <path d="M847 509 L925 535" class="line"/>
  <text x="676" y="498" class="hint">父块：章节上下文</text>
  <text x="717" y="558" class="hint">子块 A</text>
  <text x="877" y="558" class="hint">子块 B</text>
  <text x="657" y="590" class="p">检索用小块，回答时带父块上下文。</text>
</svg>
