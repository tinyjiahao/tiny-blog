<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">数据库 MCP Server 从本地到团队平台的架构演进</title>
  <desc id="desc">阶段一是个人本地使用，阶段二是团队企业使用，增加统一网关、鉴权、限流、审计和权限策略。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 20; }
      .node { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 15; }
      .platform { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 15; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .section { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .text { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .hint { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .edge { stroke: #0f766e; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="560"/>
  <text class="title" x="550" y="50" text-anchor="middle">从本地工具到团队平台</text>

  <rect class="panel" x="50" y="85" width="1000" height="150"/>
  <text class="section" x="90" y="125">阶段一：个人 / 本地使用</text>
  <rect class="node" x="90" y="155" width="150" height="52"/>
  <text class="text" x="165" y="187" text-anchor="middle">AI Agent</text>
  <path class="edge" d="M243 181 L315 181"/>
  <text class="hint" x="280" y="165" text-anchor="middle">stdio</text>
  <rect class="node" x="320" y="155" width="180" height="52"/>
  <text class="text" x="410" y="187" text-anchor="middle">本地 MCP Server</text>
  <path class="edge" d="M503 181 L575 181"/>
  <rect class="node" x="580" y="155" width="140" height="52"/>
  <text class="text" x="650" y="187" text-anchor="middle">只读账号</text>
  <path class="edge" d="M723 181 L795 181"/>
  <rect class="node" x="800" y="155" width="180" height="52"/>
  <text class="text" x="890" y="187" text-anchor="middle">开发库 / 测试库</text>

  <rect class="panel" x="50" y="280" width="1000" height="230"/>
  <text class="section" x="90" y="320">阶段二：团队 / 企业使用</text>
  <rect class="node" x="90" y="365" width="150" height="52"/>
  <text class="text" x="165" y="397" text-anchor="middle">AI Agent</text>
  <path class="edge" d="M243 391 L315 391"/>
  <rect class="platform" x="320" y="340" width="250" height="102"/>
  <text class="text" x="445" y="372" text-anchor="middle">统一 MCP 网关</text>
  <text class="hint" x="445" y="397" text-anchor="middle">Streamable HTTP</text>
  <text class="hint" x="445" y="422" text-anchor="middle">鉴权 / 限流 / 审计 / 权限策略</text>
  <path class="edge" d="M573 391 L645 391"/>
  <rect class="node" x="650" y="365" width="180" height="52"/>
  <text class="text" x="740" y="397" text-anchor="middle">数据库 MCP Server</text>
  <path class="edge" d="M833 391 L905 391"/>
  <rect class="node" x="910" y="350" width="110" height="82"/>
  <text class="text" x="965" y="378" text-anchor="middle">只读副本</text>
  <text class="hint" x="965" y="402" text-anchor="middle">脱敏视图</text>
  <text class="hint" x="965" y="425" text-anchor="middle">指标宽表</text>
</svg>
