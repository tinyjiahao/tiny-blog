<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img" aria-label="AI Agent 系统架构图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eefdf8"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .box-title{font:800 22px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .box-sub{font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .runtime-title{font:800 26px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
      .runtime-sub{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#dbeafe}
      .tag{font:800 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f766e}
      .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#f59e0b;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="860" rx="34" fill="url(#bg)"/>
  <text x="64" y="72" class="title">AI Agent 的四层协作架构</text>
  <text x="64" y="108" class="sub">Planner 负责想清楚，Executor 负责做出来，Memory 负责带上下文，Tools 负责连接外部世界</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="230" height="116" rx="22" fill="#fff"/>
    <text x="110" y="256" class="box-title">用户目标</text>
    <text x="110" y="288" class="box-sub">一句话需求、约束、偏好</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="150" width="260" height="116" rx="22" fill="#fff"/>
    <text x="424" y="196" class="box-title">Planner</text>
    <text x="424" y="228" class="box-sub">拆解目标、制定计划</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="380" y="330" width="260" height="116" rx="22" fill="#fff"/>
    <text x="424" y="376" class="box-title">Memory</text>
    <text x="424" y="408" class="box-sub">用户偏好、历史、任务状态</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="180" width="300" height="210" rx="28" fill="url(#runtime)"/>
    <text x="788" y="238" class="runtime-title">Agent Runtime</text>
    <text x="782" y="278" class="runtime-sub">选择策略、调度模块</text>
    <text x="782" y="310" class="runtime-sub">管理上下文和状态</text>
    <text x="782" y="342" class="runtime-sub">记录每次行动与观察</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="150" width="260" height="116" rx="22" fill="#fff"/>
    <text x="1164" y="196" class="box-title">Executor</text>
    <text x="1164" y="228" class="box-sub">逐步执行、观察反馈</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1120" y="330" width="260" height="116" rx="22" fill="#fff"/>
    <text x="1164" y="376" class="box-title">Tools</text>
    <text x="1164" y="408" class="box-sub">搜索、文件、API、MCP</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="560" width="300" height="116" rx="22" fill="#fff"/>
    <text x="774" y="606" class="box-title">结果与沉淀</text>
    <text x="774" y="638" class="box-sub">输出答案、写入记忆、更新状态</text>
  </g>

  <path class="line" d="M300 268 L370 208"/>
  <path class="line" d="M300 278 C342 334 342 388 370 388"/>
  <path class="line" d="M640 208 L720 250"/>
  <path class="line" d="M640 388 L720 330"/>
  <path class="line" d="M1030 250 L1110 208"/>
  <path class="line" d="M1250 266 L1250 320"/>
  <path class="line" d="M1120 388 L1040 330"/>
  <path class="line" d="M880 390 L880 550"/>
  <path class="soft" d="M880 676 C760 740 510 700 510 456"/>

  <text x="598" y="728" class="tag">任务结束后，重要经验回写 Memory</text>
</svg>
