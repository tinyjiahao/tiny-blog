<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Pi Agent Extension 事件速查封面图</title>
  <desc id="desc">用从左到右的运行链路展示 Pi Agent Extension 可监听的输入、上下文、模型、工具、消息和会话事件。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="50%" stop-color="#123b4a"/>
      <stop offset="100%" stop-color="#2d2a6f"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="20" markerHeight="20" refX="16" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M4,4 L16,10 L4,16 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1100" cy="120" r="260" fill="#38bdf8" opacity="0.12"/>
  <circle cx="230" cy="690" r="280" fill="#a78bfa" opacity="0.10"/>

  <text x="80" y="108" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="850" fill="#f8fafc">Pi Agent Extension 事件速查</text>
  <text x="82" y="160" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="650" fill="#dbeafe">按运行链路查找 input、context、provider、tool、message 和 session 事件</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="88" y="330" width="170" height="104" rx="20" fill="#102033" stroke="#38bdf8" stroke-width="3"/>
    <text x="126" y="374" font-size="24" font-weight="850" fill="#f8fafc">Input</text>
    <text x="118" y="408" font-size="16" font-weight="650" fill="#dbeafe">用户输入</text>

    <rect x="324" y="330" width="190" height="104" rx="20" fill="#102033" stroke="#f59e0b" stroke-width="3"/>
    <text x="358" y="374" font-size="24" font-weight="850" fill="#f8fafc">Agent Start</text>
    <text x="356" y="408" font-size="16" font-weight="650" fill="#dbeafe">system prompt</text>

    <rect x="580" y="330" width="170" height="104" rx="20" fill="#102033" stroke="#a78bfa" stroke-width="3"/>
    <text x="622" y="374" font-size="24" font-weight="850" fill="#f8fafc">Context</text>
    <text x="614" y="408" font-size="16" font-weight="650" fill="#dbeafe">messages</text>

    <rect x="816" y="330" width="180" height="104" rx="20" fill="#102033" stroke="#22c55e" stroke-width="3"/>
    <text x="856" y="374" font-size="24" font-weight="850" fill="#f8fafc">Provider</text>
    <text x="852" y="408" font-size="16" font-weight="650" fill="#dbeafe">模型请求</text>

    <rect x="1062" y="330" width="160" height="104" rx="20" fill="#102033" stroke="#fb7185" stroke-width="3"/>
    <text x="1110" y="374" font-size="24" font-weight="850" fill="#f8fafc">Tool</text>
    <text x="1092" y="408" font-size="16" font-weight="650" fill="#dbeafe">调用与结果</text>

    <rect x="90" y="552" width="238" height="76" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="120" y="598" font-size="20" font-weight="820" fill="#f8fafc">可改写：input</text>

    <rect x="370" y="552" width="300" height="76" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
    <text x="400" y="598" font-size="20" font-weight="820" fill="#f8fafc">可改写：before_agent_start</text>

    <rect x="712" y="552" width="242" height="76" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="3"/>
    <text x="742" y="598" font-size="20" font-weight="820" fill="#f8fafc">可改写：context</text>

    <rect x="996" y="552" width="310" height="76" rx="18" fill="#0f172a" stroke="#fb7185" stroke-width="3"/>
    <text x="1026" y="598" font-size="20" font-weight="820" fill="#f8fafc">可拦截：tool_call / tool_result</text>

    <rect x="280" y="232" width="238" height="62" rx="16" fill="#102033" stroke="#eab308" stroke-width="3"/>
    <text x="312" y="271" font-size="19" font-weight="820" fill="#f8fafc">观察：session_start</text>

    <rect x="566" y="232" width="238" height="62" rx="16" fill="#102033" stroke="#67e8f9" stroke-width="3"/>
    <text x="594" y="271" font-size="19" font-weight="820" fill="#f8fafc">观察：message_update</text>

    <rect x="852" y="232" width="238" height="62" rx="16" fill="#102033" stroke="#22c55e" stroke-width="3"/>
    <text x="884" y="271" font-size="19" font-weight="820" fill="#f8fafc">观察：model_select</text>
  </g>

  <path d="M272 382 L306 382" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M528 382 L562 382" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M764 382 L798 382" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M1010 382 L1044 382" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <text x="286" y="724" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="750" fill="#f8fafc">想改变流程，看可返回事件；只做观察，监听生命周期事件就够了。</text>
</svg>
