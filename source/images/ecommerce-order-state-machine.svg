<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-label="订单状态机图">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#111827}
      .sub{font:500 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .state{font:800 22px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .note{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .edge{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow2)}
      .fail{stroke:#ef4444;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow2)}
      .ok{stroke:#0f766e;stroke-width:3;fill:none;marker-end:url(#arrow2)}
    </style>
  </defs>
  <rect width="1400" height="620" rx="32" fill="url(#bg2)"/>
  <text x="64" y="72" class="title">订单状态机：用状态流转保护一致性</text>
  <text x="64" y="106" class="sub">每次状态变化都要记录流水，外部回调和 MQ 重试必须可幂等处理</text>

  <g filter="url(#shadow2)">
    <rect x="80" y="225" width="180" height="96" rx="22" fill="#fff"/>
    <text x="126" y="264" class="state">待创建</text>
    <text x="116" y="294" class="note">校验购物车</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="325" y="225" width="190" height="96" rx="22" fill="#fff"/>
    <text x="372" y="264" class="state">待支付</text>
    <text x="366" y="294" class="note">库存已预占</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="580" y="225" width="190" height="96" rx="22" fill="#ecfeff" stroke="#2dd4bf"/>
    <text x="626" y="264" class="state">已支付</text>
    <text x="626" y="294" class="note">等待履约</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="835" y="225" width="190" height="96" rx="22" fill="#fff"/>
    <text x="880" y="264" class="state">履约中</text>
    <text x="878" y="294" class="note">出库配送</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="1090" y="225" width="190" height="96" rx="22" fill="#f0fdf4" stroke="#86efac"/>
    <text x="1136" y="264" class="state">已完成</text>
    <text x="1136" y="294" class="note">确认收货</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="325" y="410" width="190" height="96" rx="22" fill="#fff7ed" stroke="#fdba74"/>
    <text x="372" y="449" class="state">已取消</text>
    <text x="356" y="479" class="note">释放库存/优惠</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="580" y="410" width="190" height="96" rx="22" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="626" y="449" class="state">支付失败</text>
    <text x="618" y="479" class="note">可重试或取消</text>
  </g>
  <g filter="url(#shadow2)">
    <rect x="835" y="410" width="190" height="96" rx="22" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="880" y="449" class="state">退款中</text>
    <text x="872" y="479" class="note">逆向履约</text>
  </g>

  <path class="line" d="M260 273 L315 273"/>
  <text x="276" y="252" class="edge">创建订单</text>
  <path class="ok" d="M515 273 L570 273"/>
  <text x="528" y="252" class="edge">支付成功</text>
  <path class="line" d="M770 273 L825 273"/>
  <text x="786" y="252" class="edge">发履约单</text>
  <path class="line" d="M1025 273 L1080 273"/>
  <text x="1040" y="252" class="edge">签收</text>

  <path class="fail" d="M420 321 L420 400"/>
  <text x="438" y="366" class="edge">超时未支付</text>
  <path class="fail" d="M588 320 C540 368 540 424 570 450"/>
  <text x="530" y="376" class="edge">支付失败</text>
  <path class="fail" d="M680 321 L930 400"/>
  <text x="710" y="366" class="edge">取消/售后</text>
  <path class="fail" d="M930 321 L930 400"/>
  <text x="946" y="366" class="edge">履约异常</text>

  <text x="96" y="560" class="sub">关键规则：状态只能单向推进；支付回调、取消请求、MQ 重试都用 orderId + eventId 做幂等；库存确认失败要进入补偿流程。</text>
</svg>
