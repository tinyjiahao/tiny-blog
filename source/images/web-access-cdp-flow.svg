<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">web-access CDP 调用链路</title>
  <desc id="desc">从预检、启动代理、打开目标页到 DOM 提取、截图、关闭标签页的调用流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0891b2"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, Arial, sans-serif; fill: #0f172a; }
      .stepTitle { font: 800 23px Inter, Arial, sans-serif; fill: #0f172a; }
      .stepBody { font: 600 18px Inter, Arial, sans-serif; fill: #475569; }
      .code { font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0e7490; }
    </style>
  </defs>

  <rect width="1320" height="760" fill="url(#bg)"/>
  <text x="72" y="76" class="title">web-access 的一次典型调用链路</text>

  <g>
    <rect x="76" y="150" width="238" height="150" rx="20" fill="#ffffff" stroke="#06b6d4" stroke-width="3"/>
    <text x="108" y="200" class="stepTitle">1. 预检</text>
    <text x="108" y="238" class="stepBody">检查依赖与浏览器</text>
    <text x="108" y="270" class="code">check-deps.mjs</text>
  </g>
  <path d="M318 225 H398" stroke="#0891b2" stroke-width="5" marker-end="url(#arrow)"/>

  <g>
    <rect x="414" y="150" width="238" height="150" rx="20" fill="#ffffff" stroke="#06b6d4" stroke-width="3"/>
    <text x="446" y="200" class="stepTitle">2. 代理就绪</text>
    <text x="446" y="238" class="stepBody">确认本地服务健康</text>
    <text x="446" y="270" class="code">/health /targets</text>
  </g>
  <path d="M656 225 H736" stroke="#0891b2" stroke-width="5" marker-end="url(#arrow)"/>

  <g>
    <rect x="752" y="150" width="238" height="150" rx="20" fill="#ffffff" stroke="#06b6d4" stroke-width="3"/>
    <text x="784" y="200" class="stepTitle">3. 打开页面</text>
    <text x="784" y="238" class="stepBody">保留真实登录态</text>
    <text x="784" y="270" class="code">POST /new</text>
  </g>
  <path d="M994 225 H1074" stroke="#0891b2" stroke-width="5" marker-end="url(#arrow)"/>

  <g>
    <rect x="1090" y="150" width="176" height="150" rx="20" fill="#ffffff" stroke="#06b6d4" stroke-width="3"/>
    <text x="1118" y="200" class="stepTitle">4. 取证</text>
    <text x="1118" y="238" class="stepBody">标题、DOM、媒体</text>
    <text x="1118" y="270" class="code">/info /eval</text>
  </g>

  <path d="M1178 310 C1178 386 1088 416 982 416" stroke="#0891b2" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g>
    <rect x="752" y="386" width="238" height="150" rx="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="784" y="436" class="stepTitle">5. 页面操作</text>
    <text x="784" y="474" class="stepBody">点击、滚动、上传文件</text>
    <text x="784" y="506" class="code">/click /scroll</text>
  </g>
  <path d="M748 461 H668" stroke="#0891b2" stroke-width="5" marker-end="url(#arrow)"/>

  <g>
    <rect x="414" y="386" width="238" height="150" rx="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="446" y="436" class="stepTitle">6. 截图核对</text>
    <text x="446" y="474" class="stepBody">验证视觉状态</text>
    <text x="446" y="506" class="code">/screenshot</text>
  </g>
  <path d="M410 461 H330" stroke="#0891b2" stroke-width="5" marker-end="url(#arrow)"/>

  <g>
    <rect x="76" y="386" width="238" height="150" rx="20" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
    <text x="108" y="436" class="stepTitle">7. 清理</text>
    <text x="108" y="474" class="stepBody">只关闭自己打开的页</text>
    <text x="108" y="506" class="code">/close</text>
  </g>

  <rect x="120" y="642" width="1080" height="54" rx="27" fill="#0f172a" opacity="0.9"/>
  <text x="184" y="676" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#f8fafc">关键原则：每一步都要拿页面证据说话；如果页面反馈和预期不同，立刻调整路径。</text>
</svg>
