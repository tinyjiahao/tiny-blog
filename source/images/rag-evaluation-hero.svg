<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="RAG 系统评估封面图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eefdf8"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font:800 50px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:600 23px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .panel-title{font:800 28px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
      .panel-sub{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#dbeafe}
      .box-title{font:800 23px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .box-sub{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .chip{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f766e}
      .bar{fill:#38bdf8}
      .bar2{fill:#a7f3d0}
      .bar3{fill:#fbbf24}
    </style>
  </defs>
  <rect width="1400" height="760" rx="36" fill="url(#bg)"/>
  <text x="84" y="110" class="title">RAG 系统如何评估</text>
  <text x="88" y="158" class="sub">Recall、Faithfulness、RAGAS 与 LLM-as-Judge</text>

  <g filter="url(#shadow)">
    <rect x="96" y="235" width="470" height="300" rx="32" fill="url(#core)"/>
    <text x="146" y="300" class="panel-title">从“感觉还行”到可量化评估</text>
    <text x="146" y="342" class="panel-sub">检索有没有找对？回答有没有编？</text>
    <text x="146" y="374" class="panel-sub">证据够不够？评审是否稳定？</text>
    <rect x="150" y="430" width="300" height="16" rx="8" class="bar"/>
    <rect x="150" y="468" width="245" height="16" rx="8" class="bar2"/>
    <rect x="150" y="506" width="180" height="16" rx="8" class="bar3"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="220" width="260" height="116" rx="26" fill="#fff"/>
    <text x="728" y="268" class="box-title">Recall</text>
    <text x="728" y="302" class="box-sub">关键证据有没有捞到</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1040" y="220" width="260" height="116" rx="26" fill="#fff"/>
    <text x="1088" y="268" class="box-title">Faithfulness</text>
    <text x="1088" y="302" class="box-sub">回答是否忠于证据</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="680" y="420" width="260" height="116" rx="26" fill="#fff"/>
    <text x="728" y="468" class="box-title">RAGAS</text>
    <text x="728" y="502" class="box-sub">自动化评估指标框架</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1040" y="420" width="260" height="116" rx="26" fill="#fff"/>
    <text x="1088" y="468" class="box-title">LLM-as-Judge</text>
    <text x="1088" y="502" class="box-sub">用模型做结构化裁判</text>
  </g>

  <rect x="112" y="654" width="1176" height="50" rx="25" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="154" y="686" class="chip">评估主线：先拆检索与生成，再用离线集、线上反馈、人工抽检持续校准。</text>
</svg>
