<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">提示词工程封面图</title>
  <desc id="desc">一个工程化提示词工作台，展示目标、上下文、约束、示例和评估如何共同影响模型输出。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="48%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M4,4 L20,12 L4,20 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1130" cy="150" r="250" fill="#38bdf8" opacity="0.12"/>
  <circle cx="250" cy="680" r="280" fill="#a78bfa" opacity="0.10"/>

  <text x="80" y="106" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc">提示词工程</text>
  <text x="82" y="156" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#dbeafe">把模糊愿望，变成模型能稳定执行的任务说明</text>

  <g filter="url(#shadow)">
    <rect x="94" y="260" width="310" height="270" rx="28" fill="url(#card)" stroke="#38bdf8" stroke-width="3"/>
    <text x="140" y="324" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">输入意图</text>
    <rect x="140" y="362" width="190" height="18" rx="9" fill="#bae6fd" opacity="0.9"/>
    <rect x="140" y="402" width="218" height="18" rx="9" fill="#93c5fd" opacity="0.8"/>
    <rect x="140" y="442" width="156" height="18" rx="9" fill="#c4b5fd" opacity="0.8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="544" y="216" width="330" height="360" rx="34" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
    <text x="616" y="286" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#f8fafc">Prompt</text>
    <g font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">
      <rect x="596" y="330" width="226" height="42" rx="21" fill="#164e63"/>
      <text x="628" y="358" fill="#ecfeff">目标</text>
      <rect x="596" y="392" width="226" height="42" rx="21" fill="#1e3a8a"/>
      <text x="628" y="420" fill="#dbeafe">上下文</text>
      <rect x="596" y="454" width="226" height="42" rx="21" fill="#4c1d95"/>
      <text x="628" y="482" fill="#ede9fe">约束</text>
      <rect x="596" y="516" width="226" height="42" rx="21" fill="#92400e"/>
      <text x="628" y="544" fill="#ffedd5">示例</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1010" y="260" width="304" height="270" rx="28" fill="url(#card)" stroke="#a78bfa" stroke-width="3"/>
    <text x="1054" y="324" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">稳定输出</text>
    <circle cx="1104" cy="402" r="32" fill="#22d3ee"/>
    <path d="M1089 402l10 10 22-25" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1052" y="462" width="206" height="16" rx="8" fill="#ddd6fe" opacity="0.9"/>
    <rect x="1052" y="496" width="152" height="16" rx="8" fill="#bae6fd" opacity="0.9"/>
  </g>

  <path d="M420 394 C462 394 494 394 534 394" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M894 394 C940 394 966 394 1000 394" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <rect x="232" y="642" width="936" height="58" rx="29" fill="#020617" opacity="0.30" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="292" y="679" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">好提示词不是“会说漂亮话”，而是把任务边界讲清楚、把反馈闭环跑起来。</text>
</svg>
