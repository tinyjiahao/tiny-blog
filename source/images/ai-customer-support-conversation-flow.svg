<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img" aria-label="AI 客服会话处理流程图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .node-title{font:800 20px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .node-sub{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .decision{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
      .decision-sub{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#dbeafe}
      .label{font:800 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f766e}
      .warn{fill:#fff7ed;stroke:#fdba74;stroke-width:3}
      .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .risk{stroke:#f97316;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="860" rx="34" fill="url(#bg)"/>
  <text x="64" y="72" class="title">AI 客服单轮会话处理流程</text>
  <text x="64" y="108" class="sub">每次回答都要经过理解、检索、工具调用、答案校验和升级判断，不能让模型直接裸聊业务问题</text>

  <g filter="url(#shadow)">
    <rect x="72" y="214" width="204" height="112" rx="22" fill="#fff"/>
    <text x="112" y="258" class="node-title">用户输入</text>
    <text x="112" y="290" class="node-sub">问题、图片、订单号</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="336" y="214" width="220" height="112" rx="22" fill="#fff"/>
    <text x="376" y="258" class="node-title">上下文补全</text>
    <text x="376" y="290" class="node-sub">会话历史、用户身份</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="616" y="214" width="240" height="112" rx="22" fill="#0f766e"/>
    <text x="674" y="258" class="decision">意图与风险判断</text>
    <text x="674" y="290" class="decision-sub">普通问答 / 查询 / 投诉</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="930" y="138" width="230" height="104" rx="22" fill="#fff"/>
    <text x="970" y="180" class="node-title">RAG 检索</text>
    <text x="970" y="212" class="node-sub">FAQ、政策、历史工单</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="930" y="300" width="230" height="104" rx="22" fill="#fff"/>
    <text x="970" y="342" class="node-title">业务工具调用</text>
    <text x="970" y="374" class="node-sub">订单、退款、物流</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1240" y="214" width="220" height="112" rx="22" fill="#fff"/>
    <text x="1278" y="258" class="node-title">生成候选答案</text>
    <text x="1278" y="290" class="node-sub">引用证据与业务结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="536" width="230" height="112" rx="22" fill="#fff"/>
    <text x="970" y="580" class="node-title">答案校验</text>
    <text x="970" y="612" class="node-sub">事实、权限、敏感信息</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="616" y="536" width="240" height="112" rx="22" fill="#fff"/>
    <text x="670" y="580" class="node-title">返回用户</text>
    <text x="670" y="612" class="node-sub">回答、追问、操作结果</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="336" y="536" width="220" height="112" rx="22" class="warn"/>
    <text x="376" y="580" class="node-title">转人工</text>
    <text x="376" y="612" class="node-sub">低置信度 / 高风险 / 投诉</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="536" width="204" height="112" rx="22" fill="#fff"/>
    <text x="112" y="580" class="node-title">写入事件</text>
    <text x="112" y="612" class="node-sub">日志、反馈、评估样本</text>
  </g>

  <path class="line" d="M276 270 L326 270"/>
  <path class="line" d="M556 270 L606 270"/>
  <path class="line" d="M856 248 L920 202"/>
  <path class="line" d="M856 292 L920 340"/>
  <path class="line" d="M1160 190 L1228 246"/>
  <path class="line" d="M1160 352 L1228 294"/>
  <path class="line" d="M1350 326 L1350 592 L1170 592"/>
  <path class="line" d="M930 592 L866 592"/>
  <path class="line" d="M616 592 L566 592"/>
  <path class="line" d="M336 592 L286 592"/>
  <path class="risk" d="M736 326 L736 466 L556 566"/>
  <path class="risk" d="M930 624 L566 624"/>

  <text x="876" y="220" class="label">需要知识</text>
  <text x="872" y="336" class="label">需要操作</text>
  <text x="640" y="452" class="label">触发升级</text>
  <text x="720" y="672" class="label">校验失败或高风险转人工</text>
</svg>
