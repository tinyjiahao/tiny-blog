<svg xmlns="http://www.w3.org/2000/svg" width="960" height="650" viewBox="0 0 960 650" role="img" aria-labelledby="title desc">
  <title id="title">MCP 数据库工具调用决策流程</title>
  <desc id="desc">Agent 先判断是否知道表结构，不知道则调用 describe_table，再生成只读 SQL 并查询。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #fbfaff; }
      .box { fill: #ffffff; stroke: #7c3aed; stroke-width: 2; rx: 16; }
      .diamond { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .text { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e1b4b; }
      .hint { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b21a8; }
      .edge { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="960" height="650"/>
  <text class="title" x="480" y="55" text-anchor="middle">两个工具的分工：先认路，再行动</text>
  <rect class="box" x="330" y="90" width="300" height="66"/>
  <text class="text" x="480" y="131" text-anchor="middle">用户提出业务问题</text>
  <path class="edge" d="M480 158 L480 202"/>
  <polygon class="diamond" points="480,205 650,290 480,375 310,290"/>
  <text class="text" x="480" y="282" text-anchor="middle">Agent 是否知道</text>
  <text class="text" x="480" y="309" text-anchor="middle">表结构？</text>
  <path class="edge" d="M355 290 L185 290 L185 422"/>
  <text class="hint" x="250" y="274">否</text>
  <rect class="box" x="70" y="425" width="230" height="76"/>
  <text class="text" x="185" y="458" text-anchor="middle">调用 describe_table</text>
  <text class="hint" x="185" y="482" text-anchor="middle">读取字段和类型</text>
  <path class="edge" d="M300 463 L370 463"/>
  <path class="edge" d="M605 290 L775 290 L775 422"/>
  <text class="hint" x="705" y="274">是</text>
  <rect class="box" x="370" y="425" width="220" height="76"/>
  <text class="text" x="480" y="470" text-anchor="middle">生成只读 SQL</text>
  <path class="edge" d="M590 463 L660 463"/>
  <rect class="box" x="660" y="425" width="230" height="76"/>
  <text class="text" x="775" y="456" text-anchor="middle">调用 query_readonly</text>
  <text class="hint" x="775" y="482" text-anchor="middle">聚合或明细查询</text>
  <path class="edge" d="M775 503 L775 548 L480 548 L480 577"/>
  <rect class="box" x="330" y="580" width="300" height="54"/>
  <text class="text" x="480" y="614" text-anchor="middle">汇总结果并解释原因</text>
</svg>
