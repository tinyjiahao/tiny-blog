<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">RAG 系统完整架构</title>
  <desc id="desc">展示 RAG 的离线建库链路和在线问答链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#12343b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f59e0b"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #e2e8f0; font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #cbd5e1; font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #bae6fd; font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .lane { fill: rgba(15, 23, 42, .68); stroke: #334155; stroke-width: 1.5; }
      .box { fill: url(#card); stroke: #5eead4; stroke-width: 1.8; rx: 16; }
      .note { fill: rgba(146, 64, 14, .42); stroke: #f59e0b; stroke-width: 1.6; rx: 14; }
      .arrow { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .dash { stroke: #f59e0b; stroke-width: 3; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow-amber); }
    </style>
  </defs>

  <rect width="1200" height="700" rx="28" fill="url(#bg)"/>
  <text x="60" y="66" class="title">RAG 系统完整架构</text>
  <text x="60" y="100" class="small">离线建索引，在线检索证据，再交给模型生成带引用的答案。</text>

  <rect x="60" y="130" width="1080" height="210" rx="24" class="lane"/>
  <text x="90" y="172" class="label">离线建库链路</text>
  <text x="90" y="198" class="small">文档进入系统后先清洗、分块、向量化，再写入向量库。</text>

  <rect x="95" y="240" width="150" height="72" class="box"/>
  <text x="130" y="270" class="label">原始文档</text>
  <text x="122" y="295" class="small">PDF / Wiki / API</text>
  <path d="M250 276 H315" class="arrow"/>

  <rect x="325" y="240" width="150" height="72" class="box"/>
  <text x="363" y="270" class="label">清洗分块</text>
  <text x="358" y="295" class="small">语义边界 + overlap</text>
  <path d="M480 276 H545" class="arrow"/>

  <rect x="555" y="240" width="150" height="72" class="box"/>
  <text x="595" y="270" class="label">Embedding</text>
  <text x="592" y="295" class="small">文本转向量</text>
  <path d="M710 276 H775" class="arrow"/>

  <rect x="785" y="225" width="190" height="102" class="box"/>
  <text x="833" y="263" class="label">向量库</text>
  <text x="825" y="289" class="small">向量 + 元数据</text>
  <text x="815" y="313" class="small">来源、页码、权限</text>

  <rect x="995" y="240" width="110" height="72" class="note"/>
  <text x="1021" y="270" class="label">索引</text>
  <text x="1018" y="295" class="tiny">供在线检索</text>
  <path d="M980 276 H990" class="dash"/>

  <rect x="60" y="385" width="1080" height="240" rx="24" class="lane"/>
  <text x="90" y="427" class="label">在线问答链路</text>
  <text x="90" y="453" class="small">每次请求都会先找证据，再拼 prompt，最后生成答案。</text>

  <rect x="95" y="505" width="135" height="72" class="box"/>
  <text x="127" y="535" class="label">用户问题</text>
  <text x="121" y="560" class="small">自然语言查询</text>
  <path d="M235 541 H285" class="arrow"/>

  <rect x="295" y="505" width="135" height="72" class="box"/>
  <text x="329" y="535" class="label">查询向量</text>
  <text x="325" y="560" class="small">同一模型编码</text>
  <path d="M435 541 H485" class="arrow"/>

  <rect x="495" y="505" width="135" height="72" class="box"/>
  <text x="533" y="535" class="label">召回</text>
  <text x="522" y="560" class="small">Top-K 候选片段</text>

  <path d="M880 332 V362 C880 455 640 445 580 498" class="dash"/>
  <text x="705" y="420" class="tiny">读取向量索引</text>

  <path d="M635 541 H700" class="arrow"/>
  <rect x="710" y="505" width="135" height="72" class="box"/>
  <text x="745" y="535" class="label">重排</text>
  <text x="738" y="560" class="small">筛出关键证据</text>
  <path d="M850 541 H915" class="arrow"/>

  <rect x="925" y="505" width="170" height="72" class="box"/>
  <text x="965" y="535" class="label">生成答案</text>
  <text x="958" y="560" class="small">Prompt + LLM + 引用</text>
</svg>
