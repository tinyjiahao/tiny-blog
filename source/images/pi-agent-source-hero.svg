<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Pi Agent 源码分析封面图</title>
  <desc id="desc">展示 Pi Agent 从终端输入到会话层、Agent 层、模型层和工具层的源码结构。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="48%" stop-color="#123b4a"/>
      <stop offset="100%" stop-color="#2d2a6f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="22" markerHeight="22" refX="18" refY="11" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M4,4 L18,11 L4,18 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1090" cy="128" r="260" fill="#38bdf8" opacity="0.12"/>
  <circle cx="235" cy="690" r="280" fill="#a78bfa" opacity="0.10"/>

  <text x="80" y="108" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="850" fill="#f8fafc">Pi Agent 源码分析</text>
  <text x="82" y="160" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="650" fill="#dbeafe">从一次 Prompt 出发，看懂模型、工具、会话与事件如何协作</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="94" y="278" width="260" height="210" rx="26" fill="url(#panel)" stroke="#38bdf8" stroke-width="3"/>
    <text x="138" y="338" font-size="30" font-weight="820" fill="#f8fafc">Terminal</text>
    <text x="138" y="382" font-size="20" font-weight="650" fill="#dbeafe">Interactive Mode</text>
    <text x="138" y="416" font-size="20" font-weight="650" fill="#dbeafe">用户 Prompt</text>

    <rect x="442" y="228" width="270" height="310" rx="28" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
    <text x="486" y="292" font-size="30" font-weight="820" fill="#f8fafc">AgentSession</text>
    <text x="486" y="336" font-size="19" font-weight="650" fill="#dbeafe">Skills / Hooks</text>
    <text x="486" y="370" font-size="19" font-weight="650" fill="#dbeafe">会话持久化</text>
    <text x="486" y="404" font-size="19" font-weight="650" fill="#dbeafe">上下文压缩</text>
    <text x="486" y="438" font-size="19" font-weight="650" fill="#dbeafe">UI 事件转发</text>

    <rect x="798" y="228" width="270" height="310" rx="28" fill="#0f172a" stroke="#67e8f9" stroke-width="4"/>
    <text x="858" y="292" font-size="30" font-weight="820" fill="#f8fafc">Agent</text>
    <text x="842" y="336" font-size="19" font-weight="650" fill="#dbeafe">Agent Loop</text>
    <text x="842" y="370" font-size="19" font-weight="650" fill="#dbeafe">Message State</text>
    <text x="842" y="404" font-size="19" font-weight="650" fill="#dbeafe">Tool Calls</text>
    <text x="842" y="438" font-size="19" font-weight="650" fill="#dbeafe">Streaming Events</text>

    <rect x="1146" y="278" width="160" height="90" rx="18" fill="url(#panel)" stroke="#a78bfa" stroke-width="3"/>
    <text x="1194" y="332" font-size="26" font-weight="820" fill="#f8fafc">Model</text>
    <rect x="1146" y="416" width="160" height="90" rx="18" fill="url(#panel)" stroke="#22c55e" stroke-width="3"/>
    <text x="1198" y="470" font-size="26" font-weight="820" fill="#f8fafc">Tools</text>
  </g>

  <path d="M370 383 C394 383 408 383 424 383" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M728 383 C752 383 766 383 782 383" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M1086 340 C1106 332 1120 326 1132 323" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M1086 432 C1106 444 1120 454 1132 460" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <text x="320" y="682" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="750" fill="#f8fafc">Pi 的核心不是“聊天 + Shell”，而是一套围绕消息、工具和事件运转的 Agent Harness。</text>
</svg>
