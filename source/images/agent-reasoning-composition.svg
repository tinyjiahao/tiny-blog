<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660" role="img" aria-labelledby="title desc">
  <title id="title">现代 Agent 推理模式组合</title>
  <desc id="desc">展示现代 Agent 如何组合规划、执行、工具调用、反思和记忆。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#86efac"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 32px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .p { fill: #cbd5e1; font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { fill: #f8fafc; font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { fill: rgba(15, 23, 42, .84); stroke: #86efac; stroke-width: 2; rx: 18; }
      .tool { fill: rgba(30, 64, 175, .78); stroke: #93c5fd; stroke-width: 2; rx: 16; }
      .warn { fill: rgba(146, 64, 14, .78); stroke: #fbbf24; stroke-width: 2; rx: 16; }
      .line { stroke: #86efac; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #fbbf24; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1180" height="660" rx="28" fill="url(#bg)"/>
  <text x="60" y="70" class="title">现代 Agent 通常是多种推理模式的组合</text>
  <text x="60" y="105" class="p">复杂任务先规划，执行时用 ReAct 调工具，失败后反思，记忆负责保存上下文。</text>

  <rect x="70" y="250" width="150" height="90" class="box"/>
  <text x="106" y="286" class="h">用户请求</text>
  <text x="100" y="316" class="p">目标 + 约束</text>

  <rect x="285" y="235" width="180" height="120" class="box"/>
  <text x="318" y="280" class="h">Planner</text>
  <text x="322" y="310" class="p">拆任务</text>
  <text x="322" y="334" class="p">生成计划</text>

  <rect x="530" y="235" width="180" height="120" class="box"/>
  <text x="560" y="280" class="h">Executor</text>
  <text x="562" y="310" class="p">逐项执行</text>
  <text x="562" y="334" class="p">内部用 ReAct</text>

  <rect x="775" y="155" width="160" height="82" class="tool"/>
  <text x="822" y="188" class="h">Tools</text>
  <text x="808" y="215" class="p">搜索 / 文件 / API</text>

  <rect x="775" y="288" width="160" height="82" class="tool"/>
  <text x="820" y="321" class="h">Skills</text>
  <text x="809" y="348" class="p">封装能力</text>

  <rect x="775" y="421" width="160" height="82" class="warn"/>
  <text x="804" y="454" class="h">Reflexion</text>
  <text x="803" y="481" class="p">失败后修正</text>

  <rect x="995" y="235" width="130" height="120" class="box"/>
  <text x="1030" y="280" class="h">答案</text>
  <text x="1024" y="310" class="p">结果</text>
  <text x="1024" y="334" class="p">引用与说明</text>

  <rect x="315" y="455" width="360" height="82" class="tool"/>
  <text x="426" y="488" class="h">Memory</text>
  <text x="372" y="515" class="p">对话历史、任务状态、反思记录</text>

  <path d="M220 295 H275" class="line"/>
  <path d="M465 295 H520" class="line"/>
  <path d="M710 295 H765" class="line"/>
  <path d="M935 329 H985" class="line"/>
  <path d="M710 270 C735 240 745 210 765 196" class="line"/>
  <path d="M710 320 C735 330 745 330 765 329" class="line"/>
  <path d="M855 421 V382 C855 368 855 382 855 380" class="soft"/>
  <path d="M775 462 C690 462 675 390 670 358" class="soft"/>
  <path d="M495 455 V365" class="line"/>
  <path d="M620 455 V365" class="line"/>
</svg>
