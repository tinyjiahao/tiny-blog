<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent 可观测性封面图</title>
  <desc id="desc">展示 AI Agent 的推理、工具调用、失败、成本通过 trace、metrics、logs 被记录和分析。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M4,4 L20,12 L4,20 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="250" fill="#38bdf8" opacity="0.12"/>
  <circle cx="220" cy="690" r="280" fill="#a78bfa" opacity="0.10"/>

  <text x="80" y="108" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#f8fafc">AI Agent 可观测性</text>
  <text x="82" y="158" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#dbeafe">记录推理、工具调用、失败与成本，让 Agent 出问题时有迹可循</text>

  <g filter="url(#shadow)">
    <rect x="92" y="258" width="300" height="300" rx="30" fill="url(#panel)" stroke="#38bdf8" stroke-width="3"/>
    <text x="138" y="326" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">Agent Run</text>
    <circle cx="160" cy="388" r="18" fill="#22d3ee"/>
    <circle cx="160" cy="448" r="18" fill="#a78bfa"/>
    <circle cx="160" cy="508" r="18" fill="#f59e0b"/>
    <path d="M160 406v24M160 466v24" stroke="#cbd5e1" stroke-width="5" stroke-linecap="round"/>
    <text x="198" y="396" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#dbeafe">计划</text>
    <text x="198" y="456" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#dbeafe">调用工具</text>
    <text x="198" y="516" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#dbeafe">生成结果</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="548" y="230" width="304" height="356" rx="34" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
    <text x="634" y="294" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#f8fafc">Trace</text>
    <rect x="600" y="340" width="200" height="38" rx="19" fill="#164e63"/>
    <rect x="600" y="402" width="200" height="38" rx="19" fill="#1e3a8a"/>
    <rect x="600" y="464" width="200" height="38" rx="19" fill="#4c1d95"/>
    <rect x="600" y="526" width="200" height="38" rx="19" fill="#92400e"/>
    <text x="628" y="365" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ecfeff">LLM Span</text>
    <text x="628" y="427" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#dbeafe">Tool Span</text>
    <text x="628" y="489" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ede9fe">Error Event</text>
    <text x="628" y="551" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffedd5">Cost Metric</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1000" y="258" width="310" height="300" rx="30" fill="url(#panel)" stroke="#a78bfa" stroke-width="3"/>
    <text x="1046" y="326" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#f8fafc">Dashboard</text>
    <path d="M1062 470v-58M1114 470v-96M1166 470v-42M1218 470v-122" stroke="#67e8f9" stroke-width="16" stroke-linecap="round"/>
    <path d="M1058 382 C1102 342 1148 420 1218 354" fill="none" stroke="#f59e0b" stroke-width="7" stroke-linecap="round"/>
    <text x="1060" y="520" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#dbeafe">延迟 / 失败 / 成本</text>
  </g>

  <path d="M410 408 C458 408 492 408 536 408" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M872 408 C920 408 954 408 988 408" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <text x="262" y="680" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">没有 trace 的 Agent，出了问题只能猜；有了 trace，才能复盘每一步为什么发生。</text>
</svg>
