<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent 通过 MCP 查询数据库的时序图</title>
  <desc id="desc">用户、Agent/MCP Host、MCP Server、MySQL 之间的调用时序。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .head { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
      .msg { stroke: #2563eb; stroke-width: 2.3; marker-end: url(#arrow); }
      .return { stroke: #0f766e; stroke-width: 2.3; marker-end: url(#arrow); }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .text { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="title" x="560" y="50" text-anchor="middle">一次支付失败分析的 MCP 调用时序</text>

  <rect class="head" x="60" y="85" width="160" height="54"/>
  <text class="label" x="140" y="119" text-anchor="middle">用户</text>
  <rect class="head" x="320" y="85" width="180" height="54"/>
  <text class="label" x="410" y="119" text-anchor="middle">Agent / MCP Host</text>
  <rect class="head" x="620" y="85" width="180" height="54"/>
  <text class="label" x="710" y="119" text-anchor="middle">MCP Server</text>
  <rect class="head" x="900" y="85" width="160" height="54"/>
  <text class="label" x="980" y="119" text-anchor="middle">MySQL</text>

  <line class="line" x1="140" y1="145" x2="140" y2="570"/>
  <line class="line" x1="410" y1="145" x2="410" y2="570"/>
  <line class="line" x1="710" y1="145" x2="710" y2="570"/>
  <line class="line" x1="980" y1="145" x2="980" y2="570"/>

  <line class="msg" x1="140" y1="185" x2="410" y2="185"/>
  <text class="text" x="250" y="173">业务问题</text>

  <line class="msg" x1="410" y1="245" x2="710" y2="245"/>
  <text class="text" x="505" y="232">list/call tool</text>

  <line class="msg" x1="410" y1="305" x2="710" y2="305"/>
  <text class="text" x="492" y="292">describe_table</text>
  <line class="msg" x1="710" y1="335" x2="980" y2="335"/>
  <text class="text" x="795" y="322">DESCRIBE payments</text>
  <line class="return" x1="980" y1="380" x2="710" y2="380"/>
  <text class="text" x="825" y="368">字段元数据</text>
  <line class="return" x1="710" y1="410" x2="410" y2="410"/>

  <line class="msg" x1="410" y1="465" x2="710" y2="465"/>
  <text class="text" x="492" y="452">query_readonly</text>
  <line class="msg" x1="710" y1="495" x2="980" y2="495"/>
  <text class="text" x="785" y="482">SELECT ... GROUP BY</text>
  <line class="return" x1="980" y1="535" x2="710" y2="535"/>
  <text class="text" x="835" y="523">查询结果</text>
  <line class="return" x1="710" y1="560" x2="410" y2="560"/>
  <line class="return" x1="410" y1="590" x2="140" y2="590"/>
  <text class="text" x="235" y="578">数据化结论</text>
</svg>
