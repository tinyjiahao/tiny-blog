<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img" aria-label="RAG 评估流水线">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eefdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .box-title{font:800 22px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .box-sub{font:600 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .metric{font:800 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f766e}
      .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#f59e0b;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="860" rx="34" fill="url(#bg)"/>
  <text x="64" y="72" class="title">RAG 评估要拆成两段看</text>
  <text x="64" y="108" class="sub">检索阶段看“证据有没有找对”，生成阶段看“回答有没有忠于证据”</text>

  <g filter="url(#shadow)">
    <rect x="80" y="230" width="210" height="116" rx="22" fill="#fff"/>
    <text x="120" y="276" class="box-title">问题集</text>
    <text x="120" y="308" class="box-sub">用户问题 + 标准答案</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="230" width="230" height="116" rx="22" fill="#fff"/>
    <text x="400" y="276" class="box-title">Retriever</text>
    <text x="400" y="308" class="box-sub">向量检索、关键词、Rerank</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="230" width="230" height="116" rx="22" fill="#fff"/>
    <text x="700" y="276" class="box-title">Contexts</text>
    <text x="700" y="308" class="box-sub">Top-K 证据片段</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="230" width="230" height="116" rx="22" fill="#fff"/>
    <text x="1000" y="276" class="box-title">Generator</text>
    <text x="1000" y="308" class="box-sub">Prompt + LLM 生成答案</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1260" y="230" width="190" height="116" rx="22" fill="#fff"/>
    <text x="1300" y="276" class="box-title">回答</text>
    <text x="1300" y="308" class="box-sub">答案 + 引用</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="520" width="230" height="120" rx="22" fill="#ecfeff" stroke="#99f6e4"/>
    <text x="400" y="566" class="box-title">检索评估</text>
    <text x="400" y="598" class="metric">Recall / Precision</text>
    <text x="400" y="624" class="box-sub">是否捞到关键证据</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="520" width="230" height="120" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="1000" y="566" class="box-title">生成评估</text>
    <text x="1000" y="598" class="metric">Faithfulness / Relevance</text>
    <text x="1000" y="624" class="box-sub">是否基于证据回答</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="660" width="230" height="96" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="700" y="700" class="box-title">人工抽检</text>
    <text x="700" y="730" class="box-sub">校准 LLM Judge 和阈值</text>
  </g>

  <path class="line" d="M290 288 L350 288"/>
  <path class="line" d="M590 288 L650 288"/>
  <path class="line" d="M890 288 L950 288"/>
  <path class="line" d="M1190 288 L1250 288"/>
  <path class="line" d="M475 346 L475 510"/>
  <path class="line" d="M1075 346 L1075 510"/>
  <path class="soft" d="M590 580 C640 646 650 708 660 708"/>
  <path class="soft" d="M960 580 C910 646 900 708 890 708"/>
</svg>
