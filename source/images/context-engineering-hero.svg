<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Context Engineering 上下文工程封面图</title>
  <desc id="desc">展示上下文工程如何把用户目标、系统指令、检索知识、工具结果、记忆和历史状态组织进大模型上下文窗口。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M4,4 L20,12 L4,20 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1140" cy="120" r="240" fill="#38bdf8" opacity="0.12"/>
  <circle cx="240" cy="690" r="300" fill="#a78bfa" opacity="0.10"/>

  <text x="78" y="106" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#f8fafc">Context Engineering</text>
  <text x="80" y="156" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="650" fill="#dbeafe">把正确的信息，在正确的时刻，放进模型的上下文窗口</text>

  <g filter="url(#shadow)">
    <rect x="96" y="260" width="275" height="310" rx="30" fill="url(#panel)" stroke="#38bdf8" stroke-width="3"/>
    <text x="140" y="326" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">信息来源</text>
    <g font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#dbeafe">
      <rect x="138" y="370" width="160" height="36" rx="18" fill="#0e7490"/>
      <text x="166" y="394">用户目标</text>
      <rect x="138" y="426" width="176" height="36" rx="18" fill="#1d4ed8"/>
      <text x="166" y="450">检索知识</text>
      <rect x="138" y="482" width="176" height="36" rx="18" fill="#7c3aed"/>
      <text x="166" y="506">工具结果</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="548" y="214" width="304" height="390" rx="36" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
    <text x="604" y="282" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#f8fafc">Context Window</text>
    <rect x="598" y="332" width="204" height="32" rx="16" fill="#164e63"/>
    <rect x="598" y="384" width="204" height="32" rx="16" fill="#1e3a8a"/>
    <rect x="598" y="436" width="204" height="32" rx="16" fill="#4c1d95"/>
    <rect x="598" y="488" width="204" height="32" rx="16" fill="#92400e"/>
    <text x="622" y="354" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ecfeff">指令</text>
    <text x="622" y="406" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#dbeafe">事实</text>
    <text x="622" y="458" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ede9fe">状态</text>
    <text x="622" y="510" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffedd5">约束</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1030" y="260" width="280" height="310" rx="30" fill="url(#panel)" stroke="#a78bfa" stroke-width="3"/>
    <text x="1074" y="326" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">模型输出</text>
    <circle cx="1116" cy="406" r="32" fill="#22d3ee"/>
    <path d="M1101 406l11 11 24-27" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1076" y="478" width="176" height="16" rx="8" fill="#bae6fd" opacity="0.9"/>
    <rect x="1076" y="512" width="128" height="16" rx="8" fill="#ddd6fe" opacity="0.9"/>
  </g>

  <path d="M386 416 C440 416 486 416 536 416" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M872 416 C928 416 964 416 1018 416" stroke="#67e8f9" stroke-width="7" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <text x="258" y="680" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Prompt 负责“怎么说”，Context Engineering 负责“该带什么信息一起说”。</text>
</svg>
