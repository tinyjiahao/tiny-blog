<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Pi Agent Extension 加载与运行流程</title>
  <desc id="desc">展示 Pi Agent 发现扩展、Project Trust、加载 TypeScript 模块、注册能力、接收事件和 reload 调试的流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="52%" stop-color="#123b4a"/>
      <stop offset="100%" stop-color="#2d2a6f"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M3,3 L15,9 L3,15 Z" fill="#67e8f9"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="72" y="92" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="850" fill="#f8fafc">Extension 加载与调试流程</text>
  <text x="74" y="134" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="650" fill="#dbeafe">项目级扩展先经过信任边界，再进入 Pi 运行时注册能力</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <rect x="82" y="276" width="190" height="108" rx="18" fill="#102033" stroke="#38bdf8" stroke-width="3"/>
    <text x="124" y="320" font-size="23" font-weight="820" fill="#f8fafc">发现目录</text>
    <text x="112" y="350" font-size="16" font-weight="650" fill="#cbd5e1">user / project</text>

    <rect x="350" y="276" width="190" height="108" rx="18" fill="#102033" stroke="#f59e0b" stroke-width="3"/>
    <text x="392" y="320" font-size="23" font-weight="820" fill="#f8fafc">Project Trust</text>
    <text x="390" y="350" font-size="16" font-weight="650" fill="#cbd5e1">确认可执行配置</text>

    <rect x="618" y="276" width="190" height="108" rx="18" fill="#102033" stroke="#a78bfa" stroke-width="3"/>
    <text x="656" y="320" font-size="23" font-weight="820" fill="#f8fafc">加载模块</text>
    <text x="646" y="350" font-size="16" font-weight="650" fill="#cbd5e1">export default(pi)</text>

    <rect x="886" y="276" width="190" height="108" rx="18" fill="#102033" stroke="#22c55e" stroke-width="3"/>
    <text x="928" y="320" font-size="23" font-weight="820" fill="#f8fafc">注册能力</text>
    <text x="916" y="350" font-size="16" font-weight="650" fill="#cbd5e1">tool / command / hook</text>

    <rect x="1154" y="276" width="190" height="108" rx="18" fill="#102033" stroke="#fb7185" stroke-width="3"/>
    <text x="1196" y="320" font-size="23" font-weight="820" fill="#f8fafc">参与运行</text>
    <text x="1192" y="350" font-size="16" font-weight="650" fill="#cbd5e1">events / UI / tools</text>

    <rect x="496" y="528" width="408" height="92" rx="20" fill="#0f172a" stroke="#67e8f9" stroke-width="3"/>
    <text x="596" y="584" font-size="25" font-weight="820" fill="#f8fafc">/reload 重新加载扩展</text>
  </g>

  <path d="M286 330 C306 330 326 330 338 330" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M554 330 C574 330 594 330 606 330" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M822 330 C842 330 862 330 874 330" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M1090 330 C1110 330 1130 330 1142 330" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M700 512 C700 462 700 424 700 398" stroke="#67e8f9" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <text x="296" y="694" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="750" fill="#f8fafc">开发扩展时先用项目级目录和 /reload，稳定后再考虑放到用户级目录长期启用。</text>
</svg>
