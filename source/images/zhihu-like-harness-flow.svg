<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">知乎点赞 Harness 执行流</title>
  <desc id="desc">展示 Agent 在知乎点赞任务中的打开页面、检查登录、点击赞同、验证状态和收尾流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M3,3 L15,9 L3,15 Z" fill="#0891b2"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, Arial, sans-serif; fill: #0f172a; }
      .step { font: 800 23px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 600 17px Inter, Arial, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #06b6d4; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1320" height="760" fill="url(#bg)"/>
  <text x="72" y="78" class="title">用“知乎点赞”理解 Harness</text>
  <text x="74" y="116" class="body">示例仅用于授权测试账号和自有内容，不用于批量刷赞或绕过平台规则。</text>

  <rect x="82" y="176" width="216" height="124" rx="20" class="card"/>
  <text x="116" y="224" class="step">1. 打开回答</text>
  <text x="116" y="262" class="body">浏览器进入目标页</text>
  <path d="M302 238 H382" stroke="#0891b2" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="398" y="176" width="216" height="124" rx="20" class="card"/>
  <text x="432" y="224" class="step">2. 检查状态</text>
  <text x="432" y="262" class="body">登录态、按钮状态</text>
  <path d="M618 238 H698" stroke="#0891b2" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="714" y="176" width="216" height="124" rx="20" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
  <text x="748" y="224" class="step">3. 接管登录</text>
  <text x="748" y="262" class="body">确定性逻辑处理</text>
  <path d="M934 238 H1014" stroke="#0891b2" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="1030" y="176" width="216" height="124" rx="20" class="card"/>
  <text x="1064" y="224" class="step">4. 点击赞同</text>
  <text x="1064" y="262" class="body">执行受控动作</text>

  <path d="M1138 310 C1138 388 1066 424 930 424" stroke="#0891b2" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <rect x="714" y="394" width="216" height="124" rx="20" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
  <text x="748" y="442" class="step">5. 验证结果</text>
  <text x="748" y="480" class="body">DOM / 接口 / 截图</text>
  <path d="M710 456 H630" stroke="#0891b2" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="398" y="394" width="216" height="124" rx="20" class="card"/>
  <text x="432" y="442" class="step">6. 记录 Trace</text>
  <text x="432" y="480" class="body">工具、状态、成本</text>
  <path d="M394 456 H314" stroke="#0891b2" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="82" y="394" width="216" height="124" rx="20" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/>
  <text x="116" y="442" class="step">7. 返回结果</text>
  <text x="116" y="480" class="body">成功 / 失败 / 降级</text>

  <rect x="214" y="642" width="892" height="54" rx="27" fill="#0f172a" opacity="0.9"/>
  <text x="276" y="676" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#f8fafc">关键不是让模型“更会点按钮”，而是让 Harness 知道什么时候该停、该查、该验证。</text>
</svg>
