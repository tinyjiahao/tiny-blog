<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="AI Agent 系统架构封面图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#eefdf8"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:800 52px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:600 23px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .core-title{font:800 30px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
      .core-sub{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#dbeafe}
      .box-title{font:800 23px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .box-sub{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .chip{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f766e}
      .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1400" height="760" rx="36" fill="url(#bg)"/>
  <text x="84" y="110" class="title">AI Agent 系统架构</text>
  <text x="88" y="158" class="sub">Planner、Executor、Memory、Tools 如何协作</text>

  <g filter="url(#shadow)">
    <rect x="515" y="250" width="370" height="210" rx="32" fill="url(#core)"/>
    <text x="700" y="318" class="core-title" text-anchor="middle">Agent Runtime</text>
    <text x="700" y="360" class="core-sub" text-anchor="middle">理解目标 · 调度模块 · 追踪状态</text>
    <text x="700" y="394" class="core-sub" text-anchor="middle">在“想清楚”和“做出来”之间来回切换</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="100" y="230" width="260" height="126" rx="26" fill="#fff"/>
    <text x="150" y="280" class="box-title">Planner</text>
    <text x="150" y="314" class="box-sub">拆任务、定顺序</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1040" y="230" width="260" height="126" rx="26" fill="#fff"/>
    <text x="1088" y="280" class="box-title">Executor</text>
    <text x="1088" y="314" class="box-sub">按计划执行、处理反馈</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="100" y="480" width="260" height="126" rx="26" fill="#fff"/>
    <text x="150" y="530" class="box-title">Memory</text>
    <text x="150" y="564" class="box-sub">保存上下文和经验</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1040" y="480" width="260" height="126" rx="26" fill="#fff"/>
    <text x="1088" y="530" class="box-title">Tools</text>
    <text x="1088" y="564" class="box-sub">搜索、文件、API、MCP</text>
  </g>

  <path class="line" d="M360 293 L505 330"/>
  <path class="line" d="M895 330 L1030 293"/>
  <path class="line" d="M360 543 L505 410"/>
  <path class="line" d="M895 410 L1030 543"/>

  <rect x="120" y="668" width="1160" height="50" rx="25" fill="#ecfeff" stroke="#99f6e4"/>
  <text x="160" y="700" class="chip">一句话：Agent 不是一个模型，而是一套“规划、执行、记忆、工具调用”互相配合的系统。</text>
</svg>
