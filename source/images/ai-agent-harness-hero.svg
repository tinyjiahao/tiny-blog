<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Harness 封面图</title>
  <desc id="desc">展示 Harness 如何包裹模型，为 Agent 提供工具、上下文、护栏、循环和验证。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#155e75"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>
  <circle cx="1110" cy="120" r="260" fill="#38bdf8" opacity="0.12"/>
  <circle cx="240" cy="680" r="300" fill="#a78bfa" opacity="0.10"/>

  <text x="82" y="108" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc">AI Agent Harness</text>
  <text x="84" y="158" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="650" fill="#dbeafe">用确定性的工程系统，托住一个非确定性的模型</text>

  <g filter="url(#shadow)">
    <rect x="140" y="260" width="1120" height="360" rx="42" fill="url(#panel)" stroke="#38bdf8" stroke-width="3"/>
    <rect x="520" y="342" width="360" height="196" rx="32" fill="#0f172a" stroke="#f59e0b" stroke-width="4"/>
    <text x="622" y="426" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">LLM</text>
    <text x="584" y="478" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">负责理解、判断、生成</text>

    <rect x="206" y="318" width="230" height="70" rx="35" fill="#164e63"/>
    <text x="264" y="362" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ecfeff">工具注册表</text>
    <rect x="206" y="472" width="230" height="70" rx="35" fill="#1e3a8a"/>
    <text x="264" y="516" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#dbeafe">上下文管理</text>

    <rect x="964" y="318" width="230" height="70" rx="35" fill="#4c1d95"/>
    <text x="1034" y="362" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ede9fe">护栏</text>
    <rect x="964" y="472" width="230" height="70" rx="35" fill="#92400e"/>
    <text x="1034" y="516" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffedd5">验证</text>
  </g>

  <text x="270" y="692" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">模型像大脑，Harness 像身体和神经系统：让 Agent 能进入真实工作流。</text>
</svg>
