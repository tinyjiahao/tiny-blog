<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860" role="img" aria-label="AI 客服系统数据模型关系图">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#0f172a}
      .sub{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
      .table-name{font:800 21px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#fff}
      .field{font:600 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#334155}
      .key{font:800 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#0f766e}
      .note{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;fill:#334155}
      .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#94a3b8;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="860" rx="34" fill="url(#bg)"/>
  <text x="64" y="72" class="title">AI 客服系统核心数据模型</text>
  <text x="64" y="108" class="sub">会话是中心，消息、工单、工具调用、知识引用和反馈评估都要能串回同一次服务过程</text>

  <g filter="url(#shadow)">
    <rect x="575" y="170" width="350" height="250" rx="22" fill="#fff"/>
    <rect x="575" y="170" width="350" height="58" rx="22" fill="#0f766e"/>
    <path d="M575 206 H925 V228 H575 Z" fill="#0f766e"/>
    <text x="672" y="208" class="table-name">conversations</text>
    <text x="604" y="260" class="key">PK conversation_id</text>
    <text x="604" y="290" class="field">user_id / channel</text>
    <text x="604" y="320" class="field">status / priority</text>
    <text x="604" y="350" class="field">intent / risk_level</text>
    <text x="604" y="380" class="field">assigned_agent_id</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="95" y="150" width="330" height="230" rx="20" fill="#fff"/>
    <rect x="95" y="150" width="330" height="54" rx="20" fill="#14b8a6"/>
    <path d="M95 184 H425 V204 H95 Z" fill="#14b8a6"/>
    <text x="206" y="187" class="table-name">messages</text>
    <text x="125" y="235" class="key">PK message_id</text>
    <text x="125" y="265" class="key">FK conversation_id</text>
    <text x="125" y="295" class="field">role / content</text>
    <text x="125" y="325" class="field">model_id / latency_ms</text>
    <text x="125" y="355" class="field">created_at</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="150" width="330" height="230" rx="20" fill="#fff"/>
    <rect x="1080" y="150" width="330" height="54" rx="20" fill="#2563eb"/>
    <path d="M1080 184 H1410 V204 H1080 Z" fill="#2563eb"/>
    <text x="1184" y="187" class="table-name">tickets</text>
    <text x="1110" y="235" class="key">PK ticket_id</text>
    <text x="1110" y="265" class="key">FK conversation_id</text>
    <text x="1110" y="295" class="field">type / status / sla</text>
    <text x="1110" y="325" class="field">owner_agent_id</text>
    <text x="1110" y="355" class="field">resolution_summary</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="95" y="520" width="330" height="230" rx="20" fill="#fff"/>
    <rect x="95" y="520" width="330" height="54" rx="20" fill="#f59e0b"/>
    <path d="M95 554 H425 V574 H95 Z" fill="#f59e0b"/>
    <text x="166" y="557" class="table-name">tool_call_logs</text>
    <text x="125" y="605" class="key">PK call_id</text>
    <text x="125" y="635" class="key">FK conversation_id</text>
    <text x="125" y="665" class="field">tool_name / params_hash</text>
    <text x="125" y="695" class="field">status / result_snapshot</text>
    <text x="125" y="725" class="field">risk_action</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="575" y="540" width="350" height="220" rx="20" fill="#fff"/>
    <rect x="575" y="540" width="350" height="54" rx="20" fill="#64748b"/>
    <path d="M575 574 H925 V594 H575 Z" fill="#64748b"/>
    <text x="658" y="577" class="table-name">knowledge_refs</text>
    <text x="604" y="625" class="key">PK ref_id</text>
    <text x="604" y="655" class="key">FK message_id</text>
    <text x="604" y="685" class="field">doc_id / chunk_id</text>
    <text x="604" y="715" class="field">score / version</text>
    <text x="604" y="745" class="field">citation_text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="520" width="330" height="230" rx="20" fill="#fff"/>
    <rect x="1080" y="520" width="330" height="54" rx="20" fill="#7c3aed"/>
    <path d="M1080 554 H1410 V574 H1080 Z" fill="#7c3aed"/>
    <text x="1172" y="557" class="table-name">feedbacks</text>
    <text x="1110" y="605" class="key">PK feedback_id</text>
    <text x="1110" y="635" class="key">FK conversation_id</text>
    <text x="1110" y="665" class="field">rating / reason</text>
    <text x="1110" y="695" class="field">resolved_by</text>
    <text x="1110" y="725" class="field">eval_sample_id</text>
  </g>

  <path class="line" d="M575 285 C510 285 492 266 435 266"/>
  <path class="line" d="M925 292 C988 292 1012 266 1070 266"/>
  <path class="line" d="M575 385 C500 466 484 630 435 635"/>
  <path class="line" d="M260 380 C326 454 536 520 660 540"/>
  <path class="line" d="M925 382 C1012 462 1052 638 1070 638"/>
  <path class="soft" d="M925 650 C978 616 1018 604 1070 604"/>

  <text x="452" y="248" class="note">1:N 消息</text>
  <text x="948" y="248" class="note">0:N 工单</text>
  <text x="438" y="606" class="note">1:N 工具调用</text>
  <text x="498" y="494" class="note">消息引用知识片段</text>
  <text x="946" y="604" class="note">反馈用于评估集</text>
</svg>
