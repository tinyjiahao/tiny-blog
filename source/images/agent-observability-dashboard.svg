<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent 可观测性指标面板</title>
  <desc id="desc">展示 Agent 可观测性面板中的成本、延迟、失败类型、工具调用和质量指标。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .title { font: 800 38px Inter, Arial, sans-serif; fill: #0f172a; }
      .label { font: 800 22px Inter, Arial, sans-serif; fill: #0f172a; }
      .num { font: 800 36px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 600 17px Inter, Arial, sans-serif; fill: #64748b; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1320" height="760" fill="url(#bg)"/>
  <text x="72" y="78" class="title">不要只看回答，要看运行质量</text>

  <rect x="80" y="130" width="260" height="140" rx="18" class="card"/>
  <text x="112" y="178" class="label">成本</text>
  <text x="112" y="224" class="num">$ 12.4</text>
  <text x="112" y="252" class="body">按任务、用户、工具拆分</text>

  <rect x="380" y="130" width="260" height="140" rx="18" class="card"/>
  <text x="412" y="178" class="label">延迟</text>
  <text x="412" y="224" class="num">3.8s</text>
  <text x="412" y="252" class="body">P50 / P95 / 首 token</text>

  <rect x="680" y="130" width="260" height="140" rx="18" class="card"/>
  <text x="712" y="178" class="label">失败率</text>
  <text x="712" y="224" class="num">4.2%</text>
  <text x="712" y="252" class="body">按失败类型聚合</text>

  <rect x="980" y="130" width="260" height="140" rx="18" class="card"/>
  <text x="1012" y="178" class="label">工具调用</text>
  <text x="1012" y="224" class="num">7.1</text>
  <text x="1012" y="252" class="body">平均每次 Agent Run</text>

  <rect x="80" y="326" width="530" height="300" rx="22" class="card"/>
  <text x="122" y="378" class="label">失败类型分布</text>
  <rect x="122" y="424" width="330" height="28" rx="14" fill="#38bdf8"/>
  <rect x="122" y="480" width="250" height="28" rx="14" fill="#a78bfa"/>
  <rect x="122" y="536" width="190" height="28" rx="14" fill="#f59e0b"/>
  <text x="474" y="445" class="body">工具超时</text>
  <text x="394" y="501" class="body">格式错误</text>
  <text x="334" y="557" class="body">权限不足</text>

  <rect x="710" y="326" width="530" height="300" rx="22" class="card"/>
  <text x="752" y="378" class="label">成本趋势</text>
  <path d="M762 544 C820 504 866 558 920 486 C974 414 1022 476 1072 426 C1120 378 1164 396 1200 362" fill="none" stroke="#0ea5e9" stroke-width="7" stroke-linecap="round"/>
  <path d="M762 568 H1200" stroke="#cbd5e1" stroke-width="3"/>
  <path d="M762 430 H1200" stroke="#e2e8f0" stroke-width="2"/>
  <path d="M762 292 H1200" stroke="#e2e8f0" stroke-width="2"/>

  <rect x="248" y="672" width="824" height="48" rx="24" fill="#0f172a" opacity="0.9"/>
  <text x="310" y="703" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#f8fafc">真正有用的面板，要能从“哪里贵、哪里慢、哪里错”追到具体 Trace。</text>
</svg>
